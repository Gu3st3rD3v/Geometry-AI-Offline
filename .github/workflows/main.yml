name: Geometry-Build
on: [push]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Instala dependências extras que o Android SDK 2026 exige
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      - name: Build com Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: master
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          # Isso aqui aceita as licenças do Android automaticamente
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Geometry-AI-APK
          path: bin/*.apk
          
